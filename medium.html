<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Medium Mode</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="game-container">
  <div class="left-panel">
    <div id="hangmanStage">
      <!-- Gallows -->
      <div class="pole"></div>
      <div class="beam"></div>
      <div class="rope"></div>

      <!-- Dessert body parts -->
      <div class="part head"></div>
      <div class="part body"></div>
      <div class="part arm left-arm"></div>
      <div class="part arm right-arm"></div>
      <div class="part leg left-leg"></div>
      <div class="part leg right-leg"></div>
    </div>
  </div>

  <div class="right-panel">
    <h1>Medium Mode </h1>

    <p>Health: <span id="healthDisplay">🍰🍰🍰🍰🍰🍰</span></p>

    <h2 id="wordDisplay"></h2>

    <p>Used Letters: <span id="usedLetters"></span></p>
    <p>Guesses Left: <span id="guessesLeft"></span></p>

    <div id="alphabet">
      <!-- Alphabet buttons will be generated by JavaScript -->
    </div>

    <p id="message"></p>

    <button onclick="startGame(6)">Restart</button>
    <a href="index.html"><button>Home</button></a>
  </div>
</div>

<script src="apps.js"></script>
<script>
startGame(6);
</script>

</body>
</html>
